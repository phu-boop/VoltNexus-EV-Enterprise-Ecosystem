# Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: voltnexus
spec:
  replicas: 2 # Nâng lên 2 để demo load balancing
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: my-gateway:latest # Khớp với image bạn đã build
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: voltnexus-config
            - secretRef:
                name: gateway-secret
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: voltnexus
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
---
