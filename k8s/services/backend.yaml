# Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: voltnexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: my-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: voltnexus-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: voltnexus
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
