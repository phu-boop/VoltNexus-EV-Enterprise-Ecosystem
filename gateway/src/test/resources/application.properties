# gateway/src/test/resources/application.properties
spring.application.name=gateway
server.port=8080

# Load environment variables
spring.config.import=optional:classpath:.env[.properties]

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.http.server.reactive=DEBUG
logging.level.org.springframework.web.reactive=DEBUG

# Cloud Discovery (Disabled for unit tests)
spring.cloud.discovery.enabled=false

# Routes Configuration (Mock for tests)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**

# Security / JWT
jwt.secret-key=${JWT_SECRET_KEY:YzIxZDEyM2Y0NTY3YWFkMmMzZDQ1NmFiY2QxMjM0NTY3ODlhYmNkZQ==}

# OAuth2 (REMOVED REAL SECRETS)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:PLACEHOLDER_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:PLACEHOLDER_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
