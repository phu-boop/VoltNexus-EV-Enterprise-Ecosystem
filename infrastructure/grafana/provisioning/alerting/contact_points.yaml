apiVersion: 1

contactPoints:
  - name: Slack Alerts
    orgId: 1
    receivers:
      - uid: slack-receiver-1
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          recipient: "#voltnexus-alerts"
          title: '{{ template "default.title" . }}'
          text: '{{ template "default.message" . }}'
