# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.application.name=${SPRING_APP_NAME:payment-service-test}
server.port=${SERVER_PORT:8085}

# DATABASE CONFIG
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/payment_test_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:aiven_mock_secret}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External Services
sales-service.url=${SALES_SERVICE_URI:http://localhost:8086}
user-service.url=${USER_SERVICE_URI:http://localhost:8081}
customer-service.url=${CUSTOMER_SERVICE_URI:http://localhost:8082}

# Hikari
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# VNPAY Configuration
vnpay.tmn-code=${VNPAY_TMN_CODE:mock_tmn_code}
vnpay.hash-secret=${VNPAY_HASH_SECRET:mock_hash_secret}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url-customer=${VNPAY_RETURN_URL_CUSTOMER:http://localhost:3000/payment/return}
vnpay.return-url-dealer=${VNPAY_RETURN_URL_DEALER:http://localhost:3001/payment/return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay-ipn}

vnpay.command=${VNPAY_COMMAND:pay}
vnpay.order-type=${VNPAY_ORDER_TYPE:other}
vnpay.locale=${VNPAY_LOCALE:vn}
vnpay.currency-code=${VNPAY_CURRENCY_CODE:VND}
vnpay.version=${VNPAY_VERSION:2.1.0}
