# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.application.name=${SPRING_APP_NAME:reporting-service-test}
server.port=${SERVER_PORT:8088}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:test}

# EXTERNAL SERVICES
app.services.dealer.url=${DEALER_SERVICE_URI:http://localhost:8083}
app.services.sales.url=${SALES_SERVICE_URI:http://localhost:8086}
app.services.catalog.url=${VEHICLE_SERVICE_URI:http://localhost:8087}
app.services.inventory.url=${INVENTORY_SERVICE_URI:http://localhost:8084}

# DATABASE CONFIGURATION
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reporting_test_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aiven_mock_secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA CONFIGURATION
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=reporting-service-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.ev.common_lib.event,java.util,java.lang
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.LinkedHashMap

# AI CONFIGURATION
gemini.api-key=${GEMINI_API_KEY:mock_gemini_key}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
