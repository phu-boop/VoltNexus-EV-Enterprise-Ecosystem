<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thao tác thành công | EV Automotive</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1e293b;
    }

    .container {
      background-color: #ffffff;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .icon-wrapper {
      width: 64px;
      height: 64px;
      background-color: #f0fdf4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon {
      color: #16a34a;
      font-size: 32px;
      line-height: 1;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .details {
      background-color: #f1f5f9;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: left;
      margin-bottom: 32px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .detail-row:last-child {
      margin-bottom: 0;
    }

    .btn {
      display: inline-block;
      background-color: #0f172a;
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #1e293b;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon">✓</div>
    </div>
    <h1 th:text="${message}">Thao tác thành công!</h1>
    <p>Cảm ơn bạn đã gửi phản hồi. Hệ thống đã cập nhật trạng thái yêu cầu của bạn thành công.</p>

    <div class="details" th:if="${quotationId != null or orderId != null or action != null}">
      <div class="detail-row" th:if="${quotationId != null}">
        <span style="color: #64748b;">Mã báo giá</span>
        <strong th:text="${quotationId}">Q-123</strong>
      </div>
      <div class="detail-row" th:if="${orderId != null}">
        <span style="color: #64748b;">Mã đơn hàng</span>
        <strong th:text="${orderId}">O-123</strong>
      </div>
      <div class="detail-row" th:if="${action != null}">
        <span style="color: #64748b;">Trạng thái mới</span>
        <strong th:text="${action == 'accepted' or action == 'confirmed' ? 'Đã xác nhận' : 'Đã từ chối'}"
          th:style="${action == 'accepted' or action == 'confirmed' ? 'color: #10b981;' : 'color: #ef4444;'}">
          Thành công
        </strong>
      </div>
    </div>

    <a href="http://localhost:5173/" class="btn">Quay lại trang chủ</a>
  </div>
</body>

</html>
