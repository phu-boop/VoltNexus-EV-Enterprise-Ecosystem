<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Có lỗi xảy ra | EV Automotive</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1e293b;
    }

    .container {
      background-color: #ffffff;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .icon-wrapper {
      width: 64px;
      height: 64px;
      background-color: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon {
      color: #ef4444;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .error-msg {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      color: #475569;
      margin-bottom: 32px;
      overflow-wrap: break-word;
    }

    .btn {
      display: inline-block;
      background-color: #0f172a;
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #1e293b;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon">!</div>
    </div>
    <h1>Đã có lỗi xảy ra</h1>
    <p>Rất tiếc, chúng tôi không thể xử lý yêu cầu của bạn vào lúc này. Vui lòng thử lại sau hoặc liên hệ bộ phận hỗ
      trợ.</p>

    <div class="error-msg" th:text="${errorMessage}">
      Thông tin chi tiết lỗi sẽ hiển thị ở đây.
    </div>

    <a href="http://localhost:5173/" class="btn">Quay lại trang chủ</a>
  </div>
</body>

</html>
