# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# SERVER & APPLICATION
spring.application.name=${SPRING_APP_NAME:sales-service-test}
server.port=${SERVER_PORT:8086}

# SERVICE CONFIGURATION
user-service.base-url=${USER_SERVICE_URI:http://localhost:8081}
app.services.catalog.url=${VEHICLE_SERVICE_URI:http://localhost:8087}
vehicle-service.uri=${VEHICLE_SERVICE_URI:http://localhost:8087}
app.services.inventory.url=${INVENTORY_SERVICE_URI:http://localhost:8084}
app.services.customer.url=${CUSTOMER_SERVICE_URI:http://localhost:8082}
app.services.customer-service.url=${CUSTOMER_SERVICE_URI:http://localhost:8082}
payment-service.url=${PAYMENT_SERVICE_URI:http://localhost:8085}
dealer-service.url=${DEALER_SERVICE_URI:http://localhost:8083}
reporting-service.url=${REPORTING_SERVICE_URI:http://localhost:8088}

app.urls.base-url=${APP_BASE_URL:http://localhost:8086}         
app.urls.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# SPRING MAIL CONFIGURATION
spring.mail.host=${EMAIL_HOST:localhost}
spring.mail.port=${EMAIL_PORT:2525}
spring.mail.username=${EMAIL_USERNAME:mock_email_user}
spring.mail.password=${EMAIL_PASSWORD:mock_email_pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

## HTML for send mail
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

## MySQL/H2 Configuration for Test
spring.datasource.url=jdbc:h2:mem:sales_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:sales-group-test}
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# DEBUG LOGGING (SALE-SERVICE)
logging.level.org.springframework.web=DEBUG

