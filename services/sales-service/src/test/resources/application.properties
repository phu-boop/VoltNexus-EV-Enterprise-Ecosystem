# sales-service/src/test/resources/application.properties
spring.application.name=sales-service
server.port=8086

# DATABASE Configuration
spring.datasource.url=jdbc:mysql://vms-commerce14-tmdtvmscommerce.i.aivencloud.com:25858/sales_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASS_SALES:AIVEN_PASS_SECRET}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

SPRING_DATASOURCE_URL=${spring.datasource.url}
SPRING_DATASOURCE_USERNAME=avnadmin
SPRING_DATASOURCE_PASSWORD=${DB_PASS_SALES:AIVEN_PASS_SECRET}

# KAFKA Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=sales-service-group

# REDIS Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# SERVICE URLs
user-service.url=http://localhost:8081
customer-service.url=http://localhost:8082
inventory-service.url=http://localhost:8084

# MAIL Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:PLACEHOLDER_USER}
spring.mail.password=${MAIL_PASS:PLACEHOLDER_PASS}
