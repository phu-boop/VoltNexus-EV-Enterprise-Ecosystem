spring.application.name=customer-service
server.port=8082
spring.config.import=optional:classpath:.env[.properties]

# DATABASE
spring.datasource.url=jdbc:mysql://evmclient12-vmscommerce1.l.aivencloud.com:27504/customer_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASS_CUSTOMER:AIVEN_PASS_SECRET}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=customer-service-group
KAFKA_BOOTSTRAP_SERVERS=localhost:9092

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379
SPRING_REDIS_HOST=localhost
SPRING_REDIS_PORT=6379

# SERVICE URLs
user-service.url=http://localhost:8081
vehicle-service.url=http://localhost:8087
notification-service.url=http://localhost:8085
