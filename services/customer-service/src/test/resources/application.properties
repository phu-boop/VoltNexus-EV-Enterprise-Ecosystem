# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.application.name=${SPRING_APP_NAME:customer-service}
server.port=${SERVER_PORT:8082}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/customer_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:aiven_mock_secret}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External Service URLs
user.service.url=${USER_SERVICE_URI:http://localhost:8081}
vehicle.service.url=${VEHICLE_SERVICE_URI:http://localhost:8087}
notification.service.url=${NOTIFICATION_SERVICE_URI:http://localhost:8085}

# TEST DRIVE APPOINTMENT SETTINGS
notification.enabled=${NOTIFICATION_ENABLED:false}

testdrive.min.duration.minutes=15
testdrive.max.duration.minutes=240
testdrive.min.advance.hours=2
testdrive.business.hours.start=8
testdrive.business.hours.end=18

reminder.schedule.cron=0 0 10 * * *
reminder.hours.before=24
confirmation.schedule.cron=0 0 * * * *
spring.task.scheduling.enabled=true

# EMAIL CONFIRMATION SETTINGS
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:mock_user}
spring.mail.password=${MAIL_PASSWORD:mock_pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

spring.web.resources.add-mappings=false
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=ERROR

# KAFKA
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=customer-service-group
