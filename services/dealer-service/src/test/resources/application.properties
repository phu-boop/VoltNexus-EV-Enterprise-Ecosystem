# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.application.name=${SPRING_APP_NAME:dealer-service}
server.port=${SERVER_PORT:8083}

spring.datasource.url=jdbc:h2:mem:dealer_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA (Just in case)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=dealer-service-group
