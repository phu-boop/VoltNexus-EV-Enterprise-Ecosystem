# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.application.name=${SPRING_APP_NAME:dealer-service}
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dealer_test_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aiven_mock_secret}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA (Just in case)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=dealer-service-group
