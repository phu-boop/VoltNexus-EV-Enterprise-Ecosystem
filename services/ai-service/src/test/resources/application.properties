spring.application.name=ai-service
server.port=8500

# DATABASE
spring.datasource.url=jdbc:mysql://vms-commerce14-tmdtvmscommerce.i.aivencloud.com:25858/ai_service_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=avnadmin
spring.datasource.password=${AI_DB_PASS:AIVEN_PASS_SECRET}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ai-service-group
KAFKA_BOOTSTRAP_SERVERS=localhost:9092

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379

# SERVICE URLs
user-service.url=http://localhost:8081
vehicle-service.url=http://localhost:8087
dealer-service.url=http://localhost:8083

# AI CONFIG (NO REAL KEY)
spring.ai.google.genai.api-key=${GEMINI_API_KEY:PLACEHOLDER_KEY}
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
spring.ai.google.genai.project-id=voltnexus-ev
spring.ai.google.genai.location=us-central1

# Embedding specific
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:PLACEHOLDER_KEY}
spring.ai.google.genai.embedding.project-id=voltnexus-ev
spring.ai.google.genai.embedding.location=us-central1

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:PLACEHOLDER_USER}
spring.mail.password=${MAIL_PASS:PLACEHOLDER_PASS}
