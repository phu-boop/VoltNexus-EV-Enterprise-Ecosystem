spring.application.name=vehicle-service
server.port=8087

# DATABASE Configuration
spring.datasource.url=jdbc:mysql://vms-commerce14-tmdtvmscommerce.i.aivencloud.com:25858/vehicle_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASS_VEHICLE:AIVEN_PASS_SECRET}

SPRING_DATASOURCE_URL=${spring.datasource.url}
SPRING_DATASOURCE_USERNAME=avnadmin
SPRING_DATASOURCE_PASSWORD=${DB_PASS_VEHICLE:AIVEN_PASS_SECRET}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=vehicle-service-group
KAFKA_BOOTSTRAP_SERVERS=localhost:9092

# REDIS Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
SPRING_REDIS_HOST=localhost
SPRING_REDIS_PORT=6379

# SERVICE URLs
user-service.url=http://localhost:8081
inventory-service.url=http://localhost:8084
dealer-service.url=http://localhost:8083

# CLOUDINARY Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:PLACEHOLDER_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:PLACEHOLDER_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:PLACEHOLDER_SECRET}
