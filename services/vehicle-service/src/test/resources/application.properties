# ACTUATOR & HEALTH CHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# SERVER & PROFILE
spring.application.name=${SPRING_APP_NAME:vehicle-service-test}
server.port=${SERVER_PORT:8087}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:test}

# EXTERNAL CONNECTIONS
frontend.url=${FRONTEND_URL:http://localhost:3000}
app.services.inventory.url=${INVENTORY_SERVICE_URI:http://localhost:8084}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:vehicle_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# KAFKA CONFIGURATION
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# REDIS CONFIGURATION
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.database=1
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.key-prefix=vehicle:

# SECURITY (JWT)
jwt.secret-key=${JWT_SECRET_KEY:YzIxZDEyM2Y0NTY3YWFkMmMzZDQ1NmFiY2QxMjM0NTY3ODlhYmNkZQ==}

# CLOUDINARY CONFIGURATION
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:mock_cloudinary_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:mock_cloudinary_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:mock_cloudinary_secret}
