# MySQL Configuration (Generic Placeholders)
spring.datasource.url=jdbc:mysql://evmclient12-vmscommerce1.l.aivencloud.com:27504/user_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
