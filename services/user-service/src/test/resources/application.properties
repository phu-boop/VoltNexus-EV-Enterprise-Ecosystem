SPRING_DATASOURCE_URL=jdbc:mysql://evmclient12-vmscommerce1.l.aivencloud.com:27504/user_db?sslMode=REQUIRED&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
SPRING_DATASOURCE_USERNAME=avnadmin
SPRING_DATASOURCE_PASSWORD=${USER_DB_PASS:AIVEN_PASS_SECRET}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Configuration
