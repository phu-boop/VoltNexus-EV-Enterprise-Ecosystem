FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:PLACEHOLDER_ID}
FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:PLACEHOLDER_SECRET}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:PLACEHOLDER_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:PLACEHOLDER_SECRET}
GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:PLACEHOLDER_ID}
GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:PLACEHOLDER_SECRET}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:PLACEHOLDER_USER}
spring.mail.password=${MAIL_PASS:PLACEHOLDER_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# VNPAY Configuration
vnpay.tmn-code=${VNPAY_TMN:PLACEHOLDER_TMN}
vnpay.hash-secret=${VNPAY_SECRET:PLACEHOLDER_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

# reCAPTCHA
recaptcha.secret=${RECAPTCHA_SECRET:PLACEHOLDER_SECRET}
RECAPTCHA_SECRET=${RECAPTCHA_SECRET:PLACEHOLDER_SECRET}

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=user-service-group
