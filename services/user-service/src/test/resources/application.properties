# OAuth2 Configuration (NO REAL SECRETS)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:PLACEHOLDER_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:PLACEHOLDER_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google
GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:PLACEHOLDER_ID}
GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:PLACEHOLDER_SECRET}
