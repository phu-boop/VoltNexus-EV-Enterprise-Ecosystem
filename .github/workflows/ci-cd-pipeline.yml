name: CI/CD End-to-End Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: false

###############################################################################
## JOBS CONFIGURATION
###############################################################################

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: "Initial: Checkout Code"
        uses: actions/checkout@v4

      #########################################################################
      ## PHASE 1: ENVIRONMENT & BUILD
      #########################################################################

      - name: "Build: Setup Java JDK"
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: "Build: Common Library"
        run: |
          if [ -d "common-lib" ]; then
            cd common-lib && mvn clean install -DskipTests
          fi

      - name: "Build: Bootstrap Minikube"
        uses: medyagh/setup-minikube@latest

      - name: "Build: Docker Images"
        run: |
          eval $(minikube docker-env)
          docker build -t my-gateway:latest -f gateway/Dockerfile .
          docker build -t my-user-service:latest -f services/user-service/Dockerfile .
          docker build -t my-vehicle-service:latest -f services/vehicle-service/Dockerfile .

      #########################################################################
      ## PHASE 2: SECRET & K8S INFRASTRUCTURE
      #########################################################################

      - name: "Config: Inject Firebase Secret"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p services/user-service/src/main/resources
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > services/user-service/src/main/resources/firebase-service-account.json

      - name: "Config: Apply K8s Base Resources"
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/infrastructure/

      - name: "Config: Provision K8s Secrets"
        env:
          ENV_GATEWAY: ${{ secrets.ENV_GATEWAY }}
          ENV_USER_SERVICE: ${{ secrets.ENV_USER_SERVICE }}
          ENV_CUSTOMER_SERVICE: ${{ secrets.ENV_CUSTOMER_SERVICE }}
          ENV_DEALER_SERVICE: ${{ secrets.ENV_DEALER_SERVICE }}
          ENV_INVENTORY_SERVICE: ${{ secrets.ENV_INVENTORY_SERVICE }}
          ENV_PAYMENT_SERVICE: ${{ secrets.ENV_PAYMENT_SERVICE }}
          ENV_SALES_SERVICE: ${{ secrets.ENV_SALES_SERVICE }}
          ENV_VEHICLE_SERVICE: ${{ secrets.ENV_VEHICLE_SERVICE }}
          ENV_REPORTING_SERVICE: ${{ secrets.ENV_REPORTING_SERVICE }}
          ENV_AI_SERVICE: ${{ secrets.ENV_AI_SERVICE }}
        run: |
          services=("gateway" "user-service" "customer-service" "dealer-service" "inventory-service" "payment-service" "sales-service" "vehicle-service" "reporting-service" "ai-service")
          for svc in "${services[@]}"; do
            env_var="ENV_${svc^^}"
            # Convert hyphens to underscores for variable lookup
            env_var=${env_var//-/_}
            content="${!env_var}"
            
            if [ -n "$content" ]; then
              echo "$content" > temp.env
              kubectl create secret generic "${svc}-secret" --from-env-file=temp.env -n voltnexus --dry-run=client -o yaml | kubectl apply -f -
              rm temp.env
            else
              echo "WARNING: Secret for $svc is missing in GitHub Secrets!"
              kubectl create secret generic "${svc}-secret" -n voltnexus --dry-run=client -o yaml | kubectl apply -f -
            fi
          done

      #########################################################################
      ## PHASE 3: DEPLOYMENT & VERIFICATION
      #########################################################################

      - name: "Deploy: Backend Services"
        run: |
          kubectl apply -f k8s/services/
          kubectl wait --for=condition=available --timeout=600s deployment/gateway -n voltnexus || true
          kubectl wait --for=condition=ready pod -l app=user-service -n voltnexus --timeout=300s || true
          echo "Syncing Eureka Service Discovery (60s sleep)..."
          sleep 60

      - name: "Debug: Health Check & Logs"
        run: |
          echo "==== INFRASTRUCTURE STATUS ===="
          kubectl get pods -n voltnexus
          echo "==== USER SERVICE LOGS ===="
          kubectl logs -l app=user-service -n voltnexus --tail 100 || true

      #########################################################################
      ## PHASE 4: API TESTING
      #########################################################################

      - name: "Test: Setup Postman/Newman"
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
          npm install -g newman newman-reporter-htmlextra

      - name: "Test: Execute Newman Collection"
        id: postman_tests
        continue-on-error: true
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          nohup kubectl port-forward svc/gateway 8080:8080 -n voltnexus > pf.log 2>&1 &
          PID=$!

          echo "Waiting for Gateway (max 5m)..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q 'UP'; then
              echo "Gateway is UP!"
              break
            fi
            sleep 10
          done

          newman run "https://api.getpostman.com/collections/39781229-f0d8b669-c581-47d9-a1a1-93e727adcceb?apikey=$POSTMAN_API_KEY" \
            -e "https://api.getpostman.com/environments/39781229-7aeac6e0-37d5-4086-9958-1cb4bb544661?apikey=$POSTMAN_API_KEY" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman/report.html

          kill $PID || true

      #########################################################################
      ## PHASE 5: REPORTING & NOTIFICATIONS
      #########################################################################

      - name: "Report: Publish to GitHub Pages"
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch
          git checkout gh-pages || git checkout --orphan gh-pages
          find . -maxdepth 1 -not -name 'report.html' -not -name '.git' -not -name '.' -delete || true
          cp -f newman/report.html ./
          git add report.html
          git commit -m "Update test report [skip ci]" || exit 0
          git push origin gh-pages

      - name: "Notify: Create Jira Bug on Failure"
        if: always() && steps.postman_tests.outcome == 'failure'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          SUMMARY="[CI/CD Failure] API Test Failed - ${{ github.workflow }} #${{ github.run_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GHP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html"

          DESCRIPTION="🚨 *Automated API Test Failure*\n\n"
          DESCRIPTION="${DESCRIPTION}*Workflow:* ${{ github.workflow }}\n"
          DESCRIPTION="${DESCRIPTION}*Run:* [#${{ github.run_number }}]($RUN_URL)\n"
          DESCRIPTION="${DESCRIPTION}*Branch:* ${{ github.ref_name }}\n"
          DESCRIPTION="${DESCRIPTION}*Live Report:* [View HTML]($GHP_URL)"

          cat <<EOF > jira-payload.json
          {
            "fields": {
              "project": { "key": "$JIRA_PROJECT_KEY" },
              "summary": "$SUMMARY",
              "description": "$DESCRIPTION",
              "issuetype": { "name": "Bug" }
            }
          }
          EOF

          CLEAN_URL=$(echo "${JIRA_BASE_URL}" | sed 's:\/*$::')
          curl -s -X POST --url "${CLEAN_URL}/rest/api/2/issue" \
            --user "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @jira-payload.json

      - name: "Notify: Comment on Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            🚀 **API Test Report**
            📊 **[View Full HTML Report](https://phu-boop.github.io/VoltNexus-EV-Enterprise-Ecosystem/report.html)**
            *Test Result: ${{ steps.postman_tests.outcome == 'failure' && '❌ FAILED' || '✅ PASSED' }}*
