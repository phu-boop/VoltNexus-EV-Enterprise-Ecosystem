name: CI/CD End-to-End Pipeline

on:
  push:
    branches:
      - main # Chạy khi merge release/hotfix vào main (Deploy Production)
      - develop # Chạy khi merge feature vào develop (Deploy Staging/Dev)
  pull_request:
    branches:
      - develop # Test code trước khi cho phép gộp vào develop
      - main # Kiểm tra kỹ lần cuối trước khi đưa lên bản chính thức

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build Common-Lib
        run: |
          if [ -d "common-lib" ]; then
            cd common-lib && mvn clean install -DskipTests && cd ..
          fi

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest

      - name: Build Docker Images (Optimized)
        run: |
          eval $(minikube docker-env)
          # Chỉ build ví dụ 2 cái để demo, nếu build 10 cái cần máy mạnh hơn
          docker build -t my-gateway:latest -f gateway/Dockerfile .
          docker build -t my-user-service:latest -f services/user-service/Dockerfile .
          # Thêm các lệnh build khác ở đây...

      - name: Apply K8s & Wait
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/infrastructure/
          kubectl apply -f k8s/services/
          # Tăng timeout vì Java khởi động rất chậm trong Minikube
          kubectl wait --for=condition=available --timeout=600s deployment/gateway -n voltnexus

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI & Run Tests
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          # Chạy port-forward cho Gateway để Postman Test kết nối được
          kubectl port-forward svc/gateway 8080:8080 -n voltnexus & 
          PID=$!
          sleep 15 # Đợi port-forward ổn định

          echo "Logging into Postman CLI..."
          postman login --with-api-key $POSTMAN_API_KEY

          echo "Running API tests..."
          postman collection run "39781229-f0d8b669-c581-47d9-a1a1-93e727adcceb" -e "39781229-7aeac6e0-37d5-4086-9958-1cb4bb544661"

          kill $PID # Tắt port-forward sau khi test xong

      - name: Jira Login
        if: failure()
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Bug on Failure
        if: failure()
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }}
          issuetype: Bug
          summary: "Automated API Test Failure"
          description: "Check GitHub Artifacts for HTML Report."
