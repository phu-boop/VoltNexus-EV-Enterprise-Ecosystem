name: Playwright E2E Report

on:
  push:
    paths:
      - 'frontend/my-app/**'
      - '.github/workflows/e2e-report.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e-test:
    name: "Run Playwright & Publish Report"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend/my-app
          npm install

      - name: Install Playwright Browsers
        run: |
          cd frontend/my-app
          npx playwright install --with-deps

      # Lưu ý: Ở đây chúng ta không bật full backend vì giới hạn RAM của GitHub.
      # Chúng ta chỉ chạy test những phần "Public" hoặc dùng Mock.
      - name: Run Playwright Tests (Smoke)
        run: |
          cd frontend/my-app
          npm run test:e2e:ci || true

      - name: Publish to GitHub Pages
        if: always()
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Lưu tạm báo cáo và portal
          mkdir -p temp-out/e2e-report
          cp -rf frontend/my-app/playwright-report/* temp-out/e2e-report/ || true
          if [ -f infrastructure/github-pages/index.html ]; then
            cp -f infrastructure/github-pages/index.html temp-out/index.html
          fi
          
          # Chuyển sang nhánh gh-pages
          git fetch
          git checkout gh-pages || git checkout --orphan gh-pages
          
          # Cập nhật dữ liệu (Giữ lại folder api-report nếu có)
          cp -rf temp-out/* ./
          
          git add e2e-report index.html
          git commit -m "Update Playwright E2E report & Portal [skip ci]" || exit 0
          git push origin gh-pages --force
